<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradFi 登录</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 600;
      color: #f0f6fc;
      letter-spacing: .5px;
    }
    .logo p {
      font-size: 12px;
      color: #8b949e;
      margin-top: 4px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 6px;
    }

    input[type="password"] {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color .15s;
    }
    input[type="password"]:focus {
      border-color: #388bfd;
      box-shadow: 0 0 0 3px rgba(56,139,253,.15);
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #238636;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover  { background: #2ea043; }
    button:active { background: #1a7f37; }
    button:disabled { background: #21262d; color: #484f58; cursor: default; }

    #msg {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      color: #f85149;
    }
    #msg.ok { color: #56d364; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>GateIo TradFi</h1>
      <p>输入密码</p>
    </div>

    <form id="form" onsubmit="doLogin(event)">
      <label for="pw">密码</label>
      <input id="pw" type="password" placeholder="请输入密码" autofocus autocomplete="current-password" />
      <button id="btn" type="submit">登录</button>
    </form>

    <div id="msg"></div>
  </div>

  <script>
    async function doLogin(e) {
      e.preventDefault();
      const pw  = document.getElementById('pw').value.trim();
      const btn = document.getElementById('btn');
      const msg = document.getElementById('msg');

      if (!pw) { showMsg('请输入密码', false); return; }

      btn.disabled = true;
      btn.textContent = '登录中…';
      msg.textContent = '';
      msg.className   = '';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });

        if (res.ok) {
          showMsg('登录成功，跳转中…', true);
          setTimeout(() => { window.location.href = '/'; }, 600);
        } else {
          const data = await res.json().catch(() => ({}));
          showMsg(data.detail || `登录失败 (${res.status})`, false);
          btn.disabled = false;
          btn.textContent = '登录';
        }
      } catch (err) {
        showMsg('网络错误，请重试', false);
        btn.disabled = false;
        btn.textContent = '登录';
      }
    }

    function showMsg(text, ok) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className   = ok ? 'ok' : '';
    }
  </script>
</body>
</html>
